password_config_file: ./secrets.yaml
schema: public
srid: 32631
area_id: 2
log_level: DEBUG

area: {
    name: Andorra,
}

db: {
    username: postgres,
    db_host: localhost,
    db_name: rgt,
    db_server_port: 5432,
}

area_insert: {
    activated: false,

    # If false (default), inserting an Overpass boundary that resolves to multiple polygons
    # (e.g. exclaves / disjoint geometries) will raise.
    allow_multipolygon: false,

    # Optional boundary source example. If you use "overpass", you can additionally restrict
    # the search to an enclosing administrative area chain (outer -> inner).
    # boundary_source: {
    #     type: overpass,
    #     admin_boundary_name: Andorra,
    #     enclosing_areas: ["Spain", "Catalunya"]
    # }
}

overpass: {
    # Public instance default; point this to your own instance if you run one.
    endpoint: "https://overpass-api.de/api/interpreter",
    timeout_s: 25,

    # REQUIRED for scripts using overpass-api.de: identify your application well.
    user_agent: "roadgraphtool/0.0.0 (contact: you@example.com)",

    # Optional but recommended contact metadata.
    from_email: "you@example.com",

    # Only required for browser calls; leave empty for scripts.
    referer: "",

    # Retry behavior for 429/504 (fair-use compliant; respects /api/status countdown when available).
    max_retries: 6,
    retry_backoff_s: 1.0,
    retry_max_sleep_s: 120.0
}

# Single road import step: choose exactly one backend via road_import.source.type
road_import: {
    activated: false,
    schema: importer,
    source: {
        # "osm_file" | "overpass"
        type: osm_file,
        input_file: ./andorra-latest-filtered.osm,
        force: true,
        style_file: pipeline,
        pgpass: true,
        pgpass_file: "~/pgpass.conf",
    }
}

contraction: {
    activated: false
}

strong_components: {
    activated: false
}

export: {
    activated: true,
    dir: ./
}
